<!--5 - Faça um script que leia um número e mostre uma mensagem indicando se este número é par ou ímpar e se é positivo ou negativo.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio 05</title>
</head>
<body>
    <script>
        let num1 = prompt("digite um numero")

        if (num1 % 2 == 0){
            alert("numero par")
        }else{
            alert("numero impar")
        }
    </script>
</body>
</html>
