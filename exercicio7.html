<!--Faça um script que receba um número, calcule e mostre a tabuada desse número.-->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercicio07</title>
</head>
<body>
    <script>
        let num1 = prompt("digite um numero")
        let tabuada = "";

        for (let i = 1; i <= 10; i++) {
        tabuada += num1 + " x " + i + " = " + (num1 * i) + "\n";
        }

        alert(tabuada);
    </script>
</body>
</html>
